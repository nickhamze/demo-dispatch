# Alt text for each illustration.
# Used by process_images.py to populate {slug}.alt.txt and by build-wxr.js to
# write _wp_attachment_image_alt at import time.
# One to two factual sentences, no marketing voice.

lighthouse: |
  A coastal lighthouse standing on a low cliff at midday, drawn in flat
  terracotta and ocean teal with hand-drawn ink contours.
