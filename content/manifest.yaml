      project, kitchen + visit teaser, CTA band.

  - slug: studio
    title: Studio
    parent: null
    order: 1
    summary: |
      Services page. Three-up grid of what the studio offers (design,
      editorial, small print, kitchen), each with a short blurb and a plain-
      text price range. Closes with a CTA band.

  - slug: team
    title: Team
    parent: null
    order: 2
    summary: |
      Four member cards (avatar, name, role, one-paragraph bio, beat). Uses
      the card row pattern. Below: a brief paragraph about the studio's
      working principles.

  - slug: shop
    title: Shop
    parent: null
    order: 3
    summary: |
      Index of Shop Shelf items as a card grid. Each card shows the
      illustration, title, price, and availability line. Below: a paragraph
      on shipping and returns.

  - slug: menu
    title: Menu
    parent: null
    order: 4
    summary: |
      Structured kitchen menu by section (Morning, Lunch, Sweets, Drinks).
      Each item: name, short description, price, optional dietary tag.
      Closes with a note on hours and reservations.

  - slug: visit
    title: Visit
    parent: null
    order: 5
    summary: |
      Hours, address, getting here. Hero image (the studio frontage), media-
      text block for hours + address, illustrated map placeholder, brief
      accessibility note.

  - slug: about
    title: About
    parent: null
    order: 6
    summary: |
      What the studio is, when it was founded, why. One hero image, three
      short sections, pullquote.

  # Documentation-y pages

  - slug: contact
    title: Contact
    parent: null
    order: 7
    summary: |
      A static contact page: short intro, a plain HTML form (no plugin), and
      the studio's address & hours pulled from Visit.

  - slug: press-kit
    title: Press kit
    parent: null
    order: 8
    summary: |
      Downloadable press materials. Logo lockup, brand palette swatches,
      a wp:file block linking to the bundled PDF, three approved photos
