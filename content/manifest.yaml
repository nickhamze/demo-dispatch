# ---------------------------------------------------------------------------
# Pages
# ---------------------------------------------------------------------------

pages:
  - slug: about
    title: About
    parent: null
    order: 1
    summary: |
      Publication mission plus author cards (one card per author).

  - slug: contact
    title: Contact
    parent: null
    order: 2
    summary: |
      A static contact page with HTML form markup; no plugin needed.

  - slug: elements
    title: Elements
    parent: null
    order: 3
    summary: |
      Typography and block reference page. Renders every heading level,
      paragraph, blockquote, pullquote, ordered and unordered lists, definition
      list, table, code, preformatted, figure with caption, every button
      variant, every alignment, and a six-swatch palette grid.

  - slug: privacy
    title: Privacy
    parent: null
    order: 4
    summary: |
      Our published privacy policy at /privacy/. Distinct from the WP default
      /privacy-policy/ draft, which we cannot publish via WXR-only.

  - slug: colophon
    title: Colophon
    parent: null
    order: 5
    summary: |
      Credits the illustration palette, typeface assumptions, dataset version,
      and a link to the GitHub repo.

  # Page-hierarchy test
  - slug: notebooks
    title: Notebooks
    parent: null
    order: 6
    summary: |
      Parent page for the page-hierarchy test.

  - slug: notebooks/red
    title: Red notebook
    parent: notebooks
    order: 1
    summary: |
      First child page.

  - slug: notebooks/blue
    title: Blue notebook
    parent: notebooks
    order: 2
    summary: |
      Second child page.

