# Demo Dispatch — content manifest.
#
# This file is the authoritative list of every post, page, category, tag, and
# menu in the dataset. build_wxr.py reads this manifest and assembles
# themeunittestdata-v2.xml.
#
# The studio conceit (see spec/brand.md): Demo Dispatch is a small fictional
# creative studio. Every category corresponds to a real thing the studio does,
# which gives the dataset both personality and structural breadth.
#
# Date scheme:
#   - Release date floor: 2026-04-20.
#   - The lead Field Notes essay is dated 2026-04-27 (release + 7 days) so it
#     sits at the top of the blog index in most preview environments.
#   - Public-facing posts (Dispatch, Field Notes, Projects, Shop Shelf,
#     Kitchen) are dated backwards across ~17 months down to 2024-11.
#   - Sandbox posts are dated 2024-09 to 2024-04 (18-24 months back) so they
#     never appear on page 1 of the blog index given posts_per_page=10 and
#     ~25 visible non-Sandbox posts ahead of them.
#   - See spec/dating-scheme.md for the full rationale.
#
# Block discipline (see spec/brand.md §3):
#   - Marketing pages and feed posts use only blocks from the "use freely"
#     and "use with discipline" lists.
#   - Every styled block carries both a slug class AND inline style for color
#     and font-size, so block themes layer on the top and classic themes get
#     dignified inline rendering.
#   - Sandbox is exempt; that bucket exists to torture-test edge cases.

# ---------------------------------------------------------------------------
# Categories — one per studio activity
# ---------------------------------------------------------------------------

categories:
  - slug: dispatch
    name: Dispatch
    description: |
      The studio journal. Short news, releases, openings, and announcements
      from the four members. Multi-author. Flatters news and magazine themes.

  - slug: field-notes
    name: Field Notes
    description: |
      The long pieces. Editorial essays on objects, places, and the slow work
      of paying attention. Flatters blog and journal themes.

  - slug: projects
    name: Projects
    description: |
      Case studies of design and editorial projects the studio has shipped
      for clients. Flatters portfolio and agency themes.

  - slug: shop-shelf
    name: Shop Shelf
    description: |
      Product-shaped posts for items the studio sells in its small shop —
      zines, prints, notebooks, tea blends. Flatters shop-adjacent themes.

  - slug: kitchen
    name: Kitchen
    description: |
      Notes from the small kitchen at the front of the studio — what's on
      this week, where the ingredients came from, the occasional recipe
      fragment. Flatters food and restaurant themes.

  - slug: sandbox
    name: Sandbox
    description: |
      Theme stress tests. Reachable from /category/sandbox/. Below the home
      page fold by date discipline. Verifies edge cases without polluting
      the public feed.

# ---------------------------------------------------------------------------
# Tags — small set, each used by 3+ posts
# ---------------------------------------------------------------------------

tags:
  - light
  - paper
  - water
  - weather
  - color
  - listening
  - typography
  - maps
  - navigation
  - small-things
  - food
  - workshop
  - print
  - opening

# ---------------------------------------------------------------------------
# Posts — public-facing feed
# ---------------------------------------------------------------------------
#
# Sequence (by date, newest first) is the order in which posts appear on the
# blog index. The first ~10 form page 1. We deliberately interleave categories
# so page 1 shows a mix of Dispatch news, a Field Notes essay or two, a
# Project, a Shop Shelf item, and a Kitchen note — every theme genre sees
# representative content above the fold.

