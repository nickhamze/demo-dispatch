# Demo Dispatch - content manifest.
# This file is the authoritative list of every post and page in the dataset.
# build-wxr.js reads this manifest and assembles themeunittestdata-v2.xml.
#
# Date scheme:
#   - Release date floor: 2026-04-20.
#   - The lead marquee post is dated 2026-04-27 (release + 7 days) so it sits
#     above WP's default Hello world! in most preview environments.
#   - Articles posts are dated backwards from there at irregular intervals
#     across ~17 months, ending around 2024-11.
#   - Sandbox posts are dated 2024-09 to 2024-04 (18-24 months back) so they
#     never appear on page 1 of the blog index given posts_per_page=10 and
#     ~25 visible Articles posts ahead of them.
#   - See spec/dating-scheme.md for the full rationale.
#
# Block whitelist for marquee posts (must degrade in classic themes):
#   paragraph, heading, image, quote, list, gallery, embed, separator, table.
# Sandbox posts may use any blocks.

categories:
  - slug: articles
    name: Articles
    description: Long-form essays, photo-essays, recipes, reviews, and recaps.
  - slug: notes
    name: Notes
    description: Short observations and asides.
  - slug: reviews
    name: Reviews
    description: Considered notes on small things.
  - slug: recipes
    name: Recipes
    description: A handful of seasonal recipes.
  - slug: how-to
    name: How-To
    description: Step-by-step instructions.
  - slug: audio
    name: Audio
    description: Self-hosted audio episodes.
  - slug: video
    name: Video
    description: Self-hosted and embedded video.
  - slug: sandbox
    name: Sandbox
    description: Theme stress tests. Reachable from /category/sandbox/.

tags:
  - light
  - paper
  - water
  - weather
  - color
  - listening
  - typography
  - maps
  - navigation
  - small-things

