# ---------------------------------------------------------------------------
# Menus
# ---------------------------------------------------------------------------

menus:
  # Primary navigation — four top-level items, each a small submenu. The shape
  # (parent + children) is intentional so themes render a real dropdown /
  # flyout and classic themes get a readable nested UL. Top-level labels are
  # verbs or nouns a first-time visitor can parse without context.
  - slug: primary-menu
    name: Primary
    items:
      - {label: Studio, target: page:studio, children: [
          {label: What we do, target: page:studio},
          {label: Team, target: page:team},
          {label: Projects, target: category:projects},
          {label: Press kit, target: page:press-kit},
        ]}
      - {label: Journal, target: category:dispatch, children: [
          {label: Dispatch, target: category:dispatch},
          {label: Field Notes, target: category:field-notes},
          {label: Kitchen, target: category:kitchen},
          {label: Shop Shelf, target: category:shop-shelf},
        ]}
      - {label: Shop, target: page:shop, children: [
          {label: All items, target: page:shop},
          {label: Notebooks, target: page:notebooks},
          {label: Prints, target: tag:print},
          {label: Pantry, target: tag:food},
        ]}
      - {label: Visit, target: page:visit, children: [
          {label: Hours & address, target: page:visit},
          {label: Kitchen menu, target: page:menu},
          {label: About the studio, target: page:about},
          {label: Contact, target: page:contact},
        ]}

  - slug: footer-menu
    name: Footer
    items:
      - {label: Press kit, target: page:press-kit}
      - {label: Colophon, target: page:colophon}
      - {label: Privacy, target: page:privacy}
      - {label: Elements, target: page:elements}

  - slug: social-menu
    name: Social
    items:
      - {label: Bluesky, target: 'https://bsky.app/profile/example.invalid'}
      - {label: Mastodon, target: 'https://social.example/@demo-dispatch'}
      - {label: YouTube, target: 'https://www.youtube.com/@example'}
      - {label: RSS, target: '/feed/'}
